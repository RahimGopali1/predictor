# ───────────────────────────────────────────────────────────
# Auto-Calibrate BASE Lambda
# ───────────────────────────────────────────────────────────
# Triggers whenever prediction-critical data files change.
# Runs the Monte Carlo calibration to find the optimal BASE
# lambda value and automatically updates all three source
# files if a better fit is found.
#
# Triggers:
#   - Push to data/*.json files on main
#   - Manual trigger via workflow_dispatch
#   - Once per week on schedule (Sunday 6 AM UTC)
# ───────────────────────────────────────────────────────────

name: Auto-Calibrate

on:
  push:
    branches: [main]
    paths:
      - 'data/teams-metadata.json'
      - 'data/recent-matches.json'
      - 'data/opening-fixtures.json'
      - 'data/fixture-results.json'
  schedule:
    # Every Sunday at 06:00 UTC — catch drift even without data commits
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      quick:
        description: 'Quick calibration (1 run × 3K sims) vs full (3 runs × 10K sims)'
        type: choice
        options:
          - 'false'
          - 'true'
        default: 'false'

jobs:
  calibrate:
    name: Calibrate BASE Lambda
    runs-on: ubuntu-latest

    # Grant the job permission to push back to the repo
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: ⬇ Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so we can tag the calibration commit
          fetch-depth: 0

      - name: ⚡ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🔬 Run calibration
        id: calibrate
        run: |
          # Set quick mode for push-triggered calibrations;
          # use full calibration for scheduled/manual runs
          if [ "${{ github.event_name }}" = "push" ]; then
            export CI_QUICK=1
          fi
          if [ "${{ inputs.quick }}" = "true" ]; then
            export CI_QUICK=1
          fi

          node scripts/apply-calibration.mjs
          # exit 0 = no change, 1 = update applied, 2 = error
          rc=$?
          echo "status=$rc" >> $GITHUB_OUTPUT
          if [ $rc -eq 1 ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
          # Always succeed so we can commit any changes in the next step
          exit 0

      - name: 📝 Commit calibration update
        if: steps.calibrate.outputs.changed == 'true'
        run: |
          git config user.name "Calibration Bot"
          git config user.email "bot@world-cup-predictor"

          # Read the calibration metadata for the commit message
          MSE=$(node -e "const m = require('./data/calibration-meta.json'); console.log(m.optimalMse.toFixed(4))" 2>/dev/null || echo "?")
          PREV=$(node -e "const m = require('./data/calibration-meta.json'); console.log(m.previously)" 2>/dev/null || echo "?")
          NEW=$(node -e "const m = require('./data/calibration-meta.json'); console.log(m.optimalBase.toFixed(2))" 2>/dev/null || echo "?")

          git add -A
          git commit \
            -m "auto: recalibrate BASE lambda to ${NEW} (was ${PREV}, MSE: ${MSE})" \
            -m "Auto-generated by the calibration workflow after data changes triggered this recalibration.

        The optimal BASE lambda was determined by running tournament simulations
        across multiple candidate values and selecting the one with the lowest
        mean squared error against betting market odds."

          git push
