<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <!-- Gold gradients -->
    <linearGradient id="gold1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d060"/>
      <stop offset="30%" stop-color="#e8b84b"/>
      <stop offset="60%" stop-color="#c49328"/>
      <stop offset="100%" stop-color="#806216"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5d060"/>
      <stop offset="50%" stop-color="#d4a837"/>
      <stop offset="100%" stop-color="#9c7a1e"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="65%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="malachite" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a5c40"/>
      <stop offset="30%" stop-color="#2d7a5a"/>
      <stop offset="50%" stop-color="#3a9a6a"/>
      <stop offset="70%" stop-color="#2d7a5a"/>
      <stop offset="100%" stop-color="#1a5c40"/>
    </linearGradient>
    <linearGradient id="gold3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#806216"/>
      <stop offset="40%" stop-color="#c49328"/>
      <stop offset="100%" stop-color="#f5d060"/>
    </linearGradient>
  </defs>

  <!-- Malachite Base - two stacked green cylinders -->
  <rect x="136" y="545" width="128" height="14" rx="3" fill="url(#malachite)"/>
  <rect x="128" y="559" width="144" height="16" rx="4" fill="#1a5c40"/>
  <rect x="128" y="559" width="144" height="16" rx="4" fill="url(#shine)" opacity="0.2"/>

  <!-- Text on base -->
  <text x="200" y="534" text-anchor="middle" font-size="10" font-weight="700" font-family="sans-serif" fill="#f5d060" opacity="0.8" letter-spacing="5">2026</text>

  <!-- LEFT FIGURE - substantial athlete silhouette -->
  <!-- Body/torso - curving from base upward, filled shape -->
  <path d="M195 545 L175 500 Q155 420 130 330 Q105 240 100 170 Q98 140 110 120 Q125 100 140 105 L145 115 Q135 140 140 170 Q150 250 175 330 Q195 400 205 460 L205 545Z" fill="url(#gold3)"/>
  
  <!-- Left figure head -->
  <circle cx="125" cy="108" r="16" fill="url(#gold1)"/>
  <circle cx="125" cy="108" r="16" fill="url(#shine)"/>
  
  <!-- Left figure - left arm (raised up to globe) -->
  <path d="M110 125 Q90 110 82 92 Q78 82 85 72 Q92 64 105 64" fill="none" stroke="url(#gold2)" stroke-width="14" stroke-linecap="round"/>
  
  <!-- Left figure - right arm (raised up to globe) -->
  <path d="M130 115 Q120 95 120 78 Q120 65 130 62" fill="none" stroke="url(#gold2)" stroke-width="14" stroke-linecap="round"/>

  <!-- RIGHT FIGURE - substantial athlete silhouette -->
  <!-- Body/torso - curving from base upward, filled shape -->
  <path d="M205 545 L225 500 Q245 420 270 330 Q295 240 300 170 Q302 140 290 120 Q275 100 260 105 L255 115 Q265 140 260 170 Q250 250 225 330 Q205 400 195 460 L195 545Z" fill="url(#gold3)"/>
  
  <!-- Right figure head -->
  <circle cx="275" cy="108" r="16" fill="url(#gold1)"/>
  <circle cx="275" cy="108" r="16" fill="url(#shine)"/>
  
  <!-- Right figure - left arm (raised up to globe) -->
  <path d="M270 115 Q280 95 280 78 Q280 65 270 62" fill="none" stroke="url(#gold2)" stroke-width="14" stroke-linecap="round"/>

  <!-- Right figure - right arm (raised up to globe) -->
  <path d="M290 125 Q310 110 318 92 Q322 82 315 72 Q308 64 295 64" fill="none" stroke="url(#gold2)" stroke-width="14" stroke-linecap="round"/>

  <!-- Arm shine overlays -->
  <path d="M110 125 Q90 110 82 92 Q78 82 85 72 Q92 64 105 64" fill="none" stroke="url(#shine)" stroke-width="14" stroke-linecap="round"/>
  <path d="M290 125 Q310 110 318 92 Q322 82 315 72 Q308 64 295 64" fill="none" stroke="url(#shine)" stroke-width="14" stroke-linecap="round"/>

  <!-- GLOBE - the world / football -->
  <circle cx="200" cy="60" r="65" fill="url(#gold1)"/>
  <circle cx="200" cy="60" r="65" fill="url(#shine)"/>

  <!-- Globe equator band -->
  <ellipse cx="200" cy="60" rx="65" ry="15" fill="none" stroke="#a88525" stroke-width="2.5" opacity="0.5"/>

  <!-- Globe vertical meridian lines -->
  <ellipse cx="200" cy="60" rx="20" ry="65" fill="none" stroke="#a88525" stroke-width="1.5" opacity="0.3"/>
  <ellipse cx="200" cy="60" rx="40" ry="65" fill="none" stroke="#a88525" stroke-width="1.5" opacity="0.25"/>

  <!-- Continent shapes on globe -->
  <path d="M175 25 Q185 18 198 25 Q208 35 202 48 Q195 55 180 50 Q168 45 170 35 Q172 28 175 25Z" fill="#a88525" opacity="0.5"/>
  <path d="M215 20 Q232 16 242 30 Q250 48 238 58 Q226 66 218 58 Q212 50 215 35Z" fill="#a88525" opacity="0.5"/>
  <path d="M170 72 Q185 64 200 72 Q212 80 206 92 Q195 100 178 95 Q165 88 170 72Z" fill="#a88525" opacity="0.5"/>
  <path d="M222 68 Q236 64 246 75 Q252 86 242 94 Q230 100 222 92 Q216 84 222 68Z" fill="#a88525" opacity="0.5"/>

  <!-- Figures shine overlay -->
  <path d="M195 545 L175 500 Q155 420 130 330 Q105 240 100 170 Q98 140 110 120 Q125 100 140 105 L145 115 Q135 140 140 170 Q150 250 175 330 Q195 400 205 460 L205 545Z" fill="url(#shine)" opacity="0.2"/>
  <path d="M205 545 L225 500 Q245 420 270 330 Q295 240 300 170 Q302 140 290 120 Q275 100 260 105 L255 115 Q265 140 260 170 Q250 250 225 330 Q205 400 195 460 L195 545Z" fill="url(#shine)" opacity="0.2"/>
</svg>
